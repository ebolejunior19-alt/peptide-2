<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Timer Peptides</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2ff; color: #111827; }
        .page-wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header a { color: #004aad; text-decoration: none; font-weight: 700; }
        h1 { font-size: 36px; margin-bottom: 12px; }
        p { color: #475569; line-height: 1.8; }
        .panel { background: white; border-radius: 24px; padding: 32px; border: 1px solid #dbeafe; box-shadow: 0 18px 40px rgba(59,130,246,0.08); }
        .panel h2 { font-size: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #334155; }
        input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 14px; color: #0f172a; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 14px 22px; border-radius: 14px; border: none; cursor: pointer; font-weight: 700; background: #004aad; color: white; transition: background 0.2s; }
        .btn:hover { background: #00357a; }
        .info-list { margin-top: 16px; color: #475569; line-height: 1.8; }
        .info-list li { margin-bottom: 10px; }
        @media (max-width: 780px) { .page-wrap { padding: 20px; } }
        .site-footer { background: #111827; color: #d1d5db; padding: 52px 40px 24px; }
        .footer-grid { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 40px; justify-content: space-between; }
        .footer-brand { display: flex; gap: 18px; align-items: flex-start; max-width: 420px; }
        .footer-logo { width: 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, #004aad, #0066ff); display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: 800; }
        .footer-brand-title { font-size: 16px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: white; margin-bottom: 10px; }
        .footer-brand-text { color: #cbd5db; font-size: 14px; line-height: 1.8; }
        .footer-phone { display: inline-block; margin-top: 14px; color: #ffffff; font-weight: 700; text-decoration: none; }
        .footer-column { min-width: 180px; display: flex; flex-direction: column; gap: 12px; }
        .footer-heading { font-size: 13px; color: #f8fafc; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
        .site-footer a { color: #d1d5db; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        .site-footer a:hover { color: #ffffff; }
        .footer-bottom { max-width: 1400px; margin: 28px auto 0; border-top: 1px solid #22272f; padding-top: 18px; text-align: center; font-size: 13px; color: #9ca3af; }
        @media (max-width: 780px) { .footer-grid { flex-direction: column; gap: 24px; } }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <div>
                <h1>Create Account</h1>
                <p>Register a new profile to manage your orders and shop faster.</p>
            </div>
            <a href="index.html">Back to Home</a>
        </div>

        <div class="panel">
            <h2>Sign Up</h2>
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Create a password">
            </div>
            <button class="btn" onclick="registerUser()">Create Account</button>
            <p id="registerMessage" style="margin-top: 16px; color: #dc2626; display: none;"></p>
            <p class="info-list">Already have an account? <a href="login.html" style="color:#004aad; font-weight:700;">Sign in</a></p>
        </div>
    </div>
    <script>
        function redirectIfSignedIn() {
            const currentUser = JSON.parse(localStorage.getItem('peptideCurrentUser') || 'null');
            if (currentUser) {
                window.location.href = 'profile.html';
            }
        }

        function registerUser() {
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const message = document.getElementById('registerMessage');

            if (!fullName || !email || !password) {
                message.textContent = 'Please fill in all fields to create your account.';
                message.style.display = 'block';
                return;
            }
            if (!email.includes('@') || email.indexOf('.') === -1) {
                message.textContent = 'Please enter a valid email address.';
                message.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                message.textContent = 'Use a stronger password with at least 6 characters.';
                message.style.display = 'block';
                return;
            }

            const accounts = JSON.parse(localStorage.getItem('peptideAccounts') || '[]');
            const existing = accounts.find(acc => acc.email === email);
            if (existing) {
                message.textContent = 'An account with this email already exists. Please log in instead.';
                message.style.display = 'block';
                return;
            }

            const newUser = {
                fullName,
                email,
                password,
                createdAt: new Date().toISOString()
            };
            accounts.push(newUser);
            localStorage.setItem('peptideAccounts', JSON.stringify(accounts));
            localStorage.setItem('peptideCurrentUser', JSON.stringify(newUser));

            window.location.href = 'profile.html';
        }

        document.addEventListener('DOMContentLoaded', redirectIfSignedIn);
    </script>
</body>
</html>
